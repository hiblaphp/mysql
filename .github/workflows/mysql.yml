name: MySQL Tests

on: [push, pull_request]

jobs:
  mysql-ci:
    name: PHP ${{ matrix.php }} - MySQL 8+
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: openssl, zlib, bcmath, mbstring

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache/files
          key: dependencies-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            dependencies-php-${{ matrix.php }}-composer-
            dependencies-php-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Start MySQL Services
        run: docker compose up -d mysql mysql_ssl 

      - name: Wait for MySQL Health
        run: |
          echo "Waiting for MySQL containers to be healthy..."
          ATTEMPTS=0
          until [ $ATTEMPTS -eq 30 ] || [ $(docker ps | grep -c "(healthy)") -eq 2 ]; do
            sleep 1
            ATTEMPTS=$((ATTEMPTS+1))
          done
          docker ps

      - name: Run Tests
        run: composer test:mysql

      - name: Run Static Analysis
        run: composer analyze

      - name: Shutdown Services
        if: always()
        run: docker compose down -v